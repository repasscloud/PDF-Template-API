name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_NOLOGO: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Show .NET info
        run: dotnet --info

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test PDF generation script
        run: |
          chmod +x test-invoices.sh
          ./test-invoices.sh

      - name: Upload generated PDFs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: generated-pdfs
          path: |
            invoice-1001.pdf
            invoice2-1002.pdf
            app.log